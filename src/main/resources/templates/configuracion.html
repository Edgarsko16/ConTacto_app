<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConTacto - Configuracion</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="container">
    <section class="card panel-card">
        <h1>Configuracion de necesidades</h1>
        <p class="subtitle">Edita patrones de vibracion y mensajes de voz.</p>
        <p class="field-help">Rol actual: <strong th:text="${rol}">PROFESIONAL</strong></p>

        <div class="history-table-wrapper" role="region" aria-label="Lista de necesidades configurables">
            <table class="history-table">
                <thead>
                <tr>
                    <th>Necesidad</th>
                    <th>Configuracion</th>
                    <th>Accion</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="necesidad : ${necesidades}">
                    <td>
                        <span th:text="${necesidad.icono}">💧</span>
                        <span th:text="${necesidad.nombre}">Agua</span>
                    </td>
                    <td>
                        <form class="config-form" th:action="@{/configuracion/patron}" method="post">
                            <input type="hidden" name="id" th:value="${necesidad.id}">
                            <label>Patron vibracion</label>
                            <input type="text" name="patron" th:value="${necesidad.patronVibracion}" placeholder="200,100,200">
                            <label>Mensaje de voz</label>
                            <input type="text" name="mensajeVoz" th:value="${necesidad.mensajeVoz}" placeholder="Necesito agua">
                    </td>
                    <td>
                            <button class="btn btn-primary" type="submit">Guardar</button>
                        </form>
                        <form th:action="@{/configuracion/eliminar}" method="post"
                         onsubmit="return confirm('¿Eliminar esta necesidad?');">
                        <input type="hidden" name="id" th:value="${necesidad.id}">
                        <button class="btn btn-danger" type="submit">Eliminar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <h2 class="subtitle">Nueva necesidad</h2>
        <form class="form" th:action="@{/configuracion/nueva}" method="post">
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" type="text" placeholder="Medicamento" required>

            <label for="icono">Icono</label>
            <input id="icono" name="icono" type="text" placeholder="💊">

            <label for="patron">Patron vibracion</label>
            <input id="patron" name="patron" type="text" placeholder="300,120,300">

            <label for="mensajeVoz">Mensaje de voz</label>
            <input id="mensajeVoz" name="mensajeVoz" type="text" placeholder="Necesito medicamento">

            <button class="btn btn-primary" type="submit">Agregar necesidad</button>
        </form>

        <div class="button-group panel-actions">
            <a class="btn btn-secondary" th:if="${rol == 'ADMIN'}" th:href="@{/panel}">Volver al panel</a>
            <a class="btn btn-secondary" th:if="${rol == 'PROFESIONAL'}" th:href="@{/historial}">Volver al historial</a>
            <a class="btn btn-secondary" th:href="@{/}">Ir al inicio</a>
        </div>
    </section>
</main>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
