<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConTacto - Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="container">
    <section class="card login-card" aria-labelledby="login-title">
        <div class="login-header">
            <p class="login-kicker">ConTacto</p>
            <h1 id="login-title">Ingreso seguro</h1>
            <p class="subtitle">Accede con usuario y contrasena para entrar al panel.</p>
        </div>

        <form th:action="@{/login}" th:object="${user}" method="post" class="form" aria-label="Formulario de inicio de sesion">
            <p class="alert-error" role="alert" th:if="${errorMessage}" th:text="${errorMessage}"></p>

            <label for="username">Usuario</label>
            <input id="username" th:field="*{username}" type="text" autocomplete="username" required aria-describedby="user-help">
            <small id="user-help" class="field-help">Ingresa tu nombre de usuario.</small>
            <small class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>

            <label for="password">Contrasena</label>
            <input id="password" th:field="*{password}" type="password" autocomplete="current-password" required aria-describedby="pass-help">
            <small id="pass-help" class="field-help">Ingresa tu contrasena.</small>
            <small class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>

            <button type="submit" class="btn btn-primary">Entrar</button>
            <a class="btn btn-secondary" th:href="@{/}">Volver al inicio</a>
        </form>
    </section>
</main>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
